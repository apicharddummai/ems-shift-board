    <meta charset="UTF-8">

    <style>
	
	
	
	
	
	/* จัดกลุ่มชื่อ-นามสกุล */
.name-wrapper{
    min-height: 120px;
    overflow: visible;
}


.page-title h1 {
    font-size: 36px;
    color: #0369a1;
    font-weight: 700;
}

/* เพิ่มความสวยงามให้กับข้อมูล */
.info { 
    font-size: 32px; 
    color: #334155; 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 12px;
    font-weight: 500;
}
	
	
:root {
    --primary-bg: #e0f2fe;
    --card-bg: #ffffff;
    --glass-border: #bae6fd;
    --text-main: #0c4a6e;
    --text-sub: #0369a1;
    --accent-blue: #0ea5e9;
    --accent-green: #059669;
    --accent-red: #ef4444; /* สีสำหรับลูกเล่น */
    --fs-btn-bg: #0ea5e9;
}

body { 
    margin: 0; padding: 0; 
    background: var(--primary-bg);
    font-family: 'Sarabun', sans-serif; 
    overflow: hidden; height: 100vh; 
    color: var(--text-main);
}

/* Header Section */
#header-wrapper {
    position: fixed; top: 0; left: 0; width: 100%; height: 120px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 50px; box-sizing: border-box; z-index: 100;
    background: #ffffff;
    border-bottom: 1px solid var(--glass-border);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}

#date-box { display: flex; flex-direction: column; }
#date-display { font-size: 28px; color: #64748b; font-weight: 400; }

#header-right { display: flex; align-items: center; gap: 30px; }
.logo-box { display: flex; gap: 15px; align-items: center; }
.logo-img { height: 70px; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5)); }

#clock { 
    font-size: 60px; font-weight: 800; 
    color: #0369a1; 
    text-shadow: none; 
}

/* Card Section */
#slider-wrapper { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; padding-top: 60px; box-sizing: border-box;}
#slider { display: flex; transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1); width: 100vw; will-change: transform; }
.slide { min-width: 100vw; display: flex; justify-content: center; align-items: center; }

.card { 
    width: 85vw; height: 500px; background: var(--card-bg); border-radius: 40px; 
    display: flex; align-items: center; padding: 50px 70px; 
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
    border: 2px solid #f1f5f9; position: relative; overflow: hidden;
}
h1 {
    font-size: clamp(40px, 4vw, 75px);
    color: #0f172a;
    margin: 0;
    font-weight: 800;
    line-height: 1.1;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.staff-name{
    font-size: 80px;
    font-weight: 1200;
    color: #0f172a;

    line-height: 1.45;
    padding-top: 12px;

    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
}

.img-wrapper {
    width: 380px;
    height: 430px;
    border-radius: 30px;
    margin-right: 60px;
    flex-shrink: 0;
    position: relative;
    z-index: 3;
}

.img-box {
    width: 100%;
    height: 100%;
    border-radius: 30px;
    object-fit: cover;
    object-position: center 20%;
    border: 4px solid rgba(0,0,0,0.05);
}

/* แก้ไขส่วนนี้: ทำ `.text-content` ให้เป็นกรอบสำหรับลายน้ำ */
.text-content {
    flex: 1;
    min-width: 0; /* สำคัญมาก */
    position: relative;
    z-index: 2;
}

/* เพิ่มส่วนนี้ใหม่: สไตล์สำหรับลายน้ำ สพฉ. ขนาดใหญ่ ตรงกลาง */
.text-content::before {
    content: "";
    position: absolute;
    top: 50%; /* วางตำแหน่งให้อยู่กลางแนวตั้ง */
    left: 50%; /* วางตำแหน่งให้อยู่กลางแนวนอน */
    transform: translate(-50%, -50%); /* จัดตำแหน่งให้กึ่งกลางรูปตรงกับกึ่งกลางกรอบ */
    width: 500px; /* ขนาดโลโก้ที่ใหญ่ขึ้น (ปรับได้ตามต้องการ) */
    height: 500px; /* ขนาดโลโก้ที่ใหญ่ขึ้น (ปรับได้ตามต้องการ) */
    background-image: url('https://i.postimg.cc/tgMz7SVd/sphch.png'); /* URL โลโก้ */
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0.1; /* ความจาง (0.1 คือจางมาก) */
    pointer-events: none; /* เพื่อไม่ให้ขวางการคลิก */
    z-index: -1; /* ให้อยู่ข้างหลังข้อความเสมอ */
}

/* ลูกเล่นเก่า: Scanner (ยังอยู่) */
.card::after {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(34, 2, 238, 0.1), transparent);
    animation: scanner 4s infinite linear; pointer-events: none;
    z-index: 4; /* ให้อยู่หน้าสุด */
}
@keyframes scanner { 0% { left: -100%; } 100% { left: 200%; } }

.animated-line { 
    width: 150px; height: 4px; background: linear-gradient(90deg, var(--accent-blue), transparent); 
    margin: 20px 0; animation: beam 2s infinite linear; box-shadow: 0 0 8px var(--accent-blue);
}
@keyframes beam { 0% { transform: translateX(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(200px); opacity: 0; } }

.info { font-size: 38px; color: #334155; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
.phone-box { 
    font-size: 30px; 
    color: #059669 !important; /* บังคับให้เป็นสีเขียวนี้ */
    font-weight: 700; 
    margin-top: 30px; 
    padding: 10px 20px; 
    border-top: 2px solid rgba(0,0,0,0.05); 
    display: inline-block; 
}

#fs-btn {

    padding: 10px 20px; font-size: 14px; background: var(--accent-blue); color: #fff; 
    border: none; border-radius: 12px; cursor: pointer;
	
	
}
</style>

        let idx = 0;
        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            const slider = document.getElementById('slider');
            if(slides.length > 0) {
                if (idx < slides.length - 1) { idx++; slider.style.transition = 'transform 3s cubic-bezier(0.65, 0, 0.35, 1)'; slider.style.transform = `translateX(-${idx * 100}vw)`; } 
                else { idx = 0; slider.style.transition = 'none'; slider.style.transform = `translateX(0)`; }
            }
        }, 6000);
		
		function getPositionIcon(pos) {
    const p = pos.toUpperCase();
    if (p.includes("DOCTOR")) return "👨‍⚕️";
    if (p.includes("SUPERVISOR")) return "👩‍⚕️";
    if (p.includes("EMD")) return "📟";
    if (p.includes("IT")) return "💻";
    if (p.includes("CALL TAKER")) return "📞";
    if (p.includes("บันทึก")) return "📝";
    if (p.includes("COORDINATOR")) return "📻";
    return "👤";
}

	<script>
    // ป้องกันการคลิกขวา
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    // ป้องกันการกดคีย์ลัดสำหรับการดูซอร์สโค้ด (F12, Ctrl+Shift+I, Ctrl+U)
    document.onkeydown = function(e) {
        if (event.keyCode == 123) { // F12
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
            return false;
        }
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U
            return false;
        }
    };
</script>
